<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>캐러셀</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        list-style: none;
    }

    body{
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container{
        width: 1000px;
        height: 700px;
        background-color: #c1c1c1;
        overflow: hidden; /* 벗어나는 부분이 보이지 않도록 합니다. */
    }

    .carousel{
        display: flex;
        width: 3000px;
        height: 100%;
        background-color: #f5ff9f;
        flex-wrap: nowrap;
        flex-shrink: 0;
        cursor: pointer;
    }

    .carousel > .slide{
        width: 1000px;
        height: 100%;
        background-color: #9b81fc;
        border: 1px solid #ffffff;
    }

    .carousel > .slide img{
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        display: block;
    }

    /*.carousel{*/
    /*    transform: translateX(-1000px);*/
    /*}*/
    .slide{
        position: relative;
    }
    .slide > div{
        position: absolute;
        left: 10px;
        bottom: 10px;
        background-color: rgba(0, 0, 0, 0.5);
        color: white;
    }
    .container{
        position: relative;
    }

    .button_container{
        display: flex;
        position: absolute;
        top: 0;
        width: 100%;
        height: 100%;
        justify-content: space-between;
        align-items: center;
    }

    .button_container button{
        font-size: 50px;
        color: white;
        background-color: rgb(255 255 255 / 0.5);
        border: 1px solid white;
        border-radius: 50%;
        /*padding: 10px;*/
        display: flec;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 10;
        width : 50px;
        height: 50px;
    }


</style>
<body>
    <section class="container">
        <div class="button_container">
            <button type="button">&lt;</button>
            <button type="button">&gt;</button>
        </div>

        <ul class="carousel">
            <li class="slide">
                <div>
                    <h2>TITLE 1</h2>
                    <p>Frieren</p>
                </div>
                <img src="https://img1.daumcdn.net/thumb/R1280x0.fjpg/?fname=http://t1.kakaocdn.net/brunch/service/user/avKu/image/WYw_ilxgfzgMYEBrEFLSk4wRlaU.jpg" alt="">
            </li>
            <li class="slide">
                <div>
                    <h2>TITLE 1</h2>
                    <p>Frieren</p>
                </div>
                <img src="https://img.youtube.com/vi/C0BG3B7aksU/maxresdefault.jpg" alt="">
            </li>
            <li class="slide">
                <div>
                    <h2>TITLE 1</h2>
                    <p>Frieren</p>
                </div>
                <img src="https://file.kinolights.com/l/content_still_cut/202310/12/facb9ef4-ec24-4fb3-87ab-b7780144a385.webp" alt="">
            </li>
        </ul>



    </section>



</body>
</html>

<script>
    const carousel = document.querySelector(`.carousel`);
    const[leftBtn, rightBtn] = document.querySelectorAll(`.button_container > button`);
    document.querySelectorAll(`.slide`).forEach(slide => slide.style.transform = `${carousel.clientWidth}px`);

    let index = 0;

    leftBtn.onclick = () => {
        if (index < 0 ) {
            index = index + 1000;
        }
        carousel.style.transform = `translateX(${index}px)`;
    }
    rightBtn.onclick = () => {
        if (index > -2000) {
            index = index - 1000;
        }
        carousel.style.transform = `translateX(${index}px)`;
    }
