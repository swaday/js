<!--    sync : 동기, async : 비동기 -> script 태그에 async를 넣으면 문서 로딩 중 script 태그를 만났을 때, 일단 js 파일을 전부 다운로드 시작한다.(시작만) 그리고 DOM트리를 전부 생성 완료하면 실행-->
<!--    단순 script 태그를 작성하면 문서 로딩 중 script 태그를 만나면 다운로드가 완료되면 즉시 실행된다.-->
<!--    so, 오래걸리는 작업은 async를 입력해주는 것이 유리하다. -->
<!--    script 태그에 defer를 넣으면 async와 같은 동작이지만 dom트리를 전부 생성완료하면 실행된다. (다운로드가 완료되어도 즉시 실행이 되지 않음) -->
