<script>

// 중첩 if문 : if에서 맞았을 때 하위 if에서 다시 연산하고 싶다.
  var num1 = 10;
  var num2 = 20;

  if(num1 > 5) {
    if (num2 > 30) {
      console.log("num1, num2 모두 조건에 맞습니다.");
    }
    else{
    console.log("num1은 조건에 맞지만 num2는 조건에 맞지 않습니다.");
    }
  }
  else
    console.log("num1, num2 모두 조건에 맞지 않습니다.");

  console.log("-----------------------------");


  ////////////////////////////////////////////////////

  var id = "sbs";
  var password = "12345";

  if(id === "sbs"){
    console.log("id가 일치합니다.");
    if(password === "1234"){
      console.log("password가 일치합니다.")
      console.log("로그인 성공");
    }
    else{
      console.log("password가 불일치합니다.")
      console.log("로그인 실패");
    }
  }
  else{
    console.log("id가 불일치합니다.")
  }


  /////////////////////////////////////////////////////

//   switch문

  var fruit = "apple";
  switch(fruit){
    case "apple":
      console.log("apple입니다.");
      break;
    case "banana":
      console.log("banana입니다.")
      break;
    case "orange":
      console.log("orange입니다.")
      break;
  }


//   switch 구문은 한번 맞으면 밑에 있는 케이스까지 모두 실행된다.
// 따라서 break를 씀으로써 밑에 있는 코드까지 실행을 방지한다.
// if, else if 구문을 쓰면 구문이 한몸이 되고 코드가 지저분해져 case 구문을 사용한다.
// if, else if 구문을 쓰면 위에서 실행이 될 경우 아래는 skip. 때문에 값을 모두 판단해야할 때 문제가 생길 수 있다. -> 순서가 중요하다.

//////////////////////////////////////////////////////////


var n1 = 10;
var n2 = 20;
var n3 = 15;

if(n1 > n2 && n1 > n3)
    console.log("n1이 가장 큽니다.")
else if(n2 > n1 && n2 > n3)
    console.log("n2가 가장 큽니다.")
else
    console.log("n3이 가장 큽니다.")


var number = 200;

if(number % 2 === 0) {
    console.log("짝수입니다.")
}else {
    console.log("홀수입니다.")
}
console.log("-----------------------------");

//////////////////////////////////////////////////
// 삼항연산자( 조건식 ? 참 : 거짓 )

    // var result = 1 === 1 ? "참" : "거짓";
    // var result = 1 === 1 ? (2 === 2 ? '2' : '3') : 1;

    n1 < n2 ? (n2 < n3 ? n3 : n2) : (n1 < n3 ? n3 : n1);


</script>
