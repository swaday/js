    const [fgInput, bgInput] = document.querySelectorAll('input');
    const [saveBtn, loadBtn] = document.querySelectorAll('button');
    const textarea = document.querySelector('textarea');
    saveBtn.onclick = () => {
        localStorage.setItem('fg', fgInput.value);

    loadBtn.onclick = () => {
        textarea.style.color = localStorage.getItem('fg');
        textarea.style.backgroundColor = localStorage.getItem('bg');
        alert('불러오기 완료');
    }
    fgInput.onchange = () => {
        textarea.style.color = fgInput.value;
    }
    bgInput.onchange = () => {
