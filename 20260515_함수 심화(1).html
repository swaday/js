<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>함수 심화</title>
</head>
<body>

</body>
</html>

<script>
    // 리터럴 방식 -> 기능의 이름을 변수로써 사용한다. => 변수에 함수를 담는 형태
    let func1 = function(){
        console.log(`func1 실행`);
    }
    func1();

    // 화살표 함수 표현식으로 정의한다. -> 최근 개발자들이 많이 사용하는 방식 // function을 => 화살표로 표현한다.
    let func2 = () => {
        console.log(`func2 실행`);
    }
    func2();

    // 화살표 함수에 인수 전달하기
    let func3 = (a, b) => {
        console.log(`a: ${a} / b: ${b}`)
    }
    func3(100, 200);


    // ()내 변수가 하나일 때는 괄호 생략이 가능하다 (a) -> a
    let func4 = a => {
        console.log(`func4: ${a}`);
    }
    func4(100);

    // {}내 명령문이 한줄일 경우(없어서도 안된다.) {}생략이 가능하다.
    let func5 = a => console.log(`func4: ${a}`);
    func5(100);
    //
    // let func6 = () => {
    //     return `result of func6`;
    // }
    // let result2 = func6();
    // console.log(result2);

    // 코드가 한 줄일 때 {}를 생략했다면, return 구문일 경우 return도 생략해야 한다.
    // let func7 = () => `result of func7`;
    // let result3 = func7();
    // console.log(result3);


    console.log(`>>>>>>>>>>>>>>>>> 예제1`);
    // a와 b에 데이터를 입력받아서 a+b를 return하는 함수를 화살표 함수로 정의하자.

    let func8 = (a, b) => a + b;
    let result2 = func8(100, 200);
    console.log(result2);

    //////////////////////////////////////////
    // 클래스의 정의

    class person{
        constructor(){
            this.name = `홍길동`;
            this.age = 20;
        }
    }
    let 사람 = new person();
    사람.name = `사람`;
    console.log(사람);
    let 사람2 = new person();
    console.log(사람2);
    // 사람, 사람2가 객체라는 의미


    // 이전에 배웠던 객체(리터럴 형태)
    let p = {
        "name": "홍길동",
        age: 20
    }
    p[`name`]; p.name; // '.'은 어떤 데이터 안에 들어있다는 표현
    // p[age]; // age 변수를 사용하는 것(에러)
    p[`age`]; p.age; // key는 무조건 문자열이다.

    ////////////////////////////////////////////////

    function computer(){
        this.serial = ``;
        this.price = 0;
    }
    let com1 = new computer(); // new = 클래스로써 동작한다.
    console.log(com1);

    ////////////////////////////////////////////////

    let arr = [100, 200, 300]
    console.log(arr);
    let v0 = arr[`0`];
    console.log(v0);
    console.log(arr.length);
    console.log(arr[`length`]); // 대괄호 안에서는 거의 대부분 가능.
    arr.push(400);
    console.log(arr);
    arr[10] = 1000; // 원래 다른 프로그램에서는 에러사항(존재하는 index 번호를 초과할 수 없다)
    console.log(arr);




</script>
