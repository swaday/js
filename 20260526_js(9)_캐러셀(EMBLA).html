<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>embla carousel</title>
    <script src="https://unpkg.com/embla-carousel/embla-carousel.umd.js"></script>

</head>
<style>
    .embla__viewport {
        overflow: hidden;
    }

    .embla__container {
        display: flex;
        touch-action: pan-y pinch-zoom;
    }

    .embla__slide {
        flex: 0 0 100%;
        min-width: 0;
    }
</style>
<body>
    <div class="embla">
        <div class="embla__viewport">
            <div class="embla__container">
                <div class="embla__slide">Slide 1</div>
                <div class="embla__slide">Slide 2</div>
                <div class="embla__slide">Slide 3</div>
            </div>
        </div>

        <button class="embla__prev">Scroll to prev</button>
        <button class="embla__next">Scroll to next</button>
    </div>
</body>
</html>

<script type="text/javascript">
    const viewportNode = document.querySelector('.embla__viewport')
    const prevButtonNode = document.querySelector('.embla__prev')
    const nextButtonNode = document.querySelector('.embla__next')

    // 2. Embla 초기화 (옵션 설정)
    const emblaApi = EmblaCarousel(viewportNode, { loop: true })

    // 3. 버튼 이벤트 연결 (함수명이 다릅니다!)
    // goToPrev -> scrollPrev
    // goToNext -> scrollNext
    prevButtonNode.addEventListener('click', () => emblaApi.scrollPrev(), false)
    nextButtonNode.addEventListener('click', () => emblaApi.scrollNext(), false)
</script>
