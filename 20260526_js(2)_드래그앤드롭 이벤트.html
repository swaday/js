    // for문으로 하는 방식

    let dragElem = null;
    // let sections = document.querySelectorAll(`section`);
    let origin = [`#a99ef3`, `#f39e9e`, `#f5ff9f`, `#b9ffc2`];
    for(let i = 0; i < sections.length; i++) {
        let s = sections[i];

        s.draggable = true;
        s.ondragstart = () => {
            dragElem = s;
        }
        s.ondragenter = () => {
            s.style.backgroundColor = getComputedStyle(dragElem).backgroundColor;
        s.ondragleave = () => {
            s.style.backgroundColor = origin[i];}
        }
    }

    // 처음부터 끝까지 순회하려면 -> for(let s of sections){}로 작성하면 편리하다.
