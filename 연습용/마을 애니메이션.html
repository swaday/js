<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>마을 애니메이션</title>
    <link rel="stylesheet" href="마을 애니메이션.css">
</head>
<body>
    <h1>Have a Good Day!!</h1>
    <section>
        <article class="sky">
            <img class="sun" src="image/sun.png" height="200" width="200"/>
            <img class="cloud1" src="image/cloud1.png" height="35" width="97"/>
            <img class="cloud2" src="image/cloud2.png" height="72" width="282"/>
        </article>
        <article class="town">
            <img class="circle" src="image/circle.png" height="220" width="210"/>
            <img class="night" src="image/town_night.png" height="270" width="936"/>
            <img class="day" src="image/town_day.png" height="270" width="936"/>
        </article>
        <article class="people">
            <img class="man" src="image/man.png" height="60" width="58"/>
            <img class="family" src="image/family.png" height="83" width="56"/>
        </article>
    </section>
</body>
</html>
