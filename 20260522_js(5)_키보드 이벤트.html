<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>키보드 이벤트</title>
</head>
<body>
  <textarea></textarea>

</body>
</html>
<script>
  let textarea = document.querySelector('textarea');
  textarea.onkeydown = (event) => {
    console.log('키보드 이벤트 발생(down)');
    let key = event.key;
    console.log(`눌린 key: ${key}`); // 영어가 아니라 한글로 작성 시 process라고 나온다.
  }
  textarea.onkeyup = () => {
    console.log('키보드 이벤트 발생(up)');
  }
</script>
