<script>
  a = 1
  a = 2
  A = 2
//   변수는 대소문자를 확실하게 구분한다.
  number = 3
  Number = 4

//   '='을 사용하여 변수를 지정하는 것은 '변수를 초기화하다.'라고 말한다.

  var n5 = 3;
  let n6 = 4;
  const n7 = 5;

//   var, let, const를 모두 사용할 수 있으나 let을 사용하도록 한다.
//   앞에 명령어를 붙이면 변수를 생성하는 것
//   var = 원래 있던 값을 죽이고 새로 생성하는 것(추천하지는 않음 : 코드가 길 경우 예전에 사용하던 변수를 삭제시킬 수 있음)
//   let = 원래 있던 값을 죽이고 새로 생성 불가(syntex error)
//   const = 똑같은 변수에 값을 변경하는 것 자체가 불가(내부적으로 효율이 좋아 속도가 빨라짐)

  var r = 1 == 1;
  console.log("r:", r);
//   [논리형] 1과 1이 같은지 r값에 저장하라는 의미

  var r = 1 != 1;
  console.log("r:", r);
  //   [논리형] 1과 1이 다른지 r값에 저장하라는 의미

  var n1 = 10;
  var n2 = 20;

  var result = n1 < n2;
  console.log("result:", result);

  var a = 10;
  var b = '프로그램';
  var result = a + b;
  console.log("result:", result);
//   숫자 + 문자열을 하더라도 이어붙은 새로운 문자열로 변한다.

  var a = 10;
  var b = true;
  var result = a + b;
  console.log("result:", result);
//   1=true, 0=false로 판단
//   \n : enter
//   \t : tab

  var message = "내가 얘기한 것 : 'Hello, World!'";
  console.log(message);
//   안, 밖에 다른 따옴표를 쓰면 말하는 것이 표현가능하다.
//   둘 다 같은 종류의 따옴표를 써야할 때에는 양쪽에 백슬래시를 사용하면 문자열로 인식하여 출력가능하다.

  "C:\\Users\\d\\Desktop\\박소하\\js"

//   따라서 경로는 백슬래시 2개씩 사용



</script>
