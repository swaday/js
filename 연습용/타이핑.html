<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>타이핑</title>
</head>
<style>
    span{
        display: inline-block;
        color: #c1c1c1;
        border-right: 2px solid #c1c1c1;
        white-space: nowrap;
        overflow: hidden;
        width: 0;
        animation: typing 18s steps(80) forwards, blink 0.3s step-end infinite;
    }

    @keyframes typing{
        from{
            width: 0;
        }
        to{
            width: 100%;
        }
    }

    @keyframes blink{
        from, to{
            border-color: transparent;
        }
        50%{
            border-color: #c1c1c1;
        }
    }

</style>
<body>
    <main>
        <h1>My Portfolio</h1>
        <span>Developer</span>
    </main>
</body>
</html>
