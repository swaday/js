<script>
    var n = 1;
    while(n<=5){
        console.log("n:", n);
        n ++; // n = n + 1; n += 1; -> 2 이상 감소시키는 것은 불가능
    }

    /////// 문자열 code를 선언한 후, code에 A를 하나씩 붙여서 AAAAA가 되면 종료
    var code = ""; // 문자열 code를 선언(빈문자열)
    while(code !== "AAAAA"){
        code = code + "A";
        console.log("현재 code:", code);
    }
    console.log("최종 code:", code);


    ////////////////// 중첩 while(while 안에 while)

    var n1 = 0;
    var n2 = 0;
    while(n1 < 3){
        while(n2 < 3){
            console.log("n1(bf):", n1, "n2(bf):", n2);
            n2++;
            console.log("n1(aft):", n1, "n2(aft):", n2);
        }
        n1++; // n1에 1 더하기
        console.log("n1:", n1, "n2:", n2);
    }

    //////////////////////////////////////////////////////////
    console.log("///////////////////////////////");

    var n1 = 0;
    var n2 = 0;
    while(n1 < 3){
        while(n2 < 3){
            console.log("n1(bf):", n1, "n2(bf):", n2);
            n2++;
            // console.log("n1(aft):", n1, "n2(aft):", n2);
        }
        n2 = 0;
        n1++; // n1에 1 더하기
        console.log("n1:", n1, "n2:", n2);
    }


    console.log("///////////////////////////////");
    var n1 = 0;
    while(n1 < 3){
        // if나 while 안에서 변수를 생성하기. -> 지역변수 생성
        // 변수를 사용할 수 있는 범위 == scope(스코프)
        var n2 = 0;
        while(n2 < 3){
            console.log("n1(bf):", n1, "n2(bf):", n2);
            n2++;
        }
        n1++;
    }
    console.log(n2);

    //
    // console.log("///////////구구단 만들기//////////");
    // console.log('2 × 1 = 2')
    // console.log('2 × 2 = 4')
    // console.log('2 × 3 = 6')
    //
    // let num = 1;
    // while(num <= 9){
    //     console.log(`2 × ${num} = ${2 * num}`);
    //     num++;
    // }
    // // console.log(`2 × ${num} = ${2 * num}`);
    // // // let message = '2 ×' + num + '=' + 2 * num;
    // // // console.log(`num은 ${num}이다.`)
    // // console.log("2 ×", num, "=", 2 * num);


    console.log("///////////구구단 만들기(2~9단)//////////");

    let number1 = 1; // 곱하는 수
    let number2 = 1; // 단 수
    while(number2 <= 9) {
        while (number1 <= 9) {
            console.log(`${number2} × ${number1} = ${number2 * number1}`);
            number1++;
        }
        number1 = 1;
        // console.log(`${number2} × ${number1} = ${number2 * number1}`);
        number2++;
    }

    let multiple = 1;
    while(multiple <= 9) {
        let message = "";
        let dan = 2;
        while(dan <= 9) {
            message += `${dan} × ${multiple} = ${dan * multiple}\t`;
            // console.log(`${dan} × ${multiple} = ${dan * multiple}`);
            dan++;
        }
        console.log(message);
        multiple++;
    }


    console.log("///////////3의 배수만 출력하기//////////");

    let number3 = 1;
    while(number3 <= 100) {
        if(number3 % 3 === 0) {
            console.log(number3);
        }
        number3++;
    }

    console.log("///////////for문//////////");
//     초기화(맨처음 단 1번만 실행), 조건식, 증감식 순서로 작성
//     여기서 i는 지역변수(for문 안에서만 살아있다.)
    for(let i = 0; i < 3; i++){
        console.log("i:", i);
    }

    // 변수를 밖에 만드는건 비추천, 변수를 여러가지 만드는 것 역시 비추천
    // let ii = 0;
    // for(; ii < 3; ii++){
    //     console.log("ii:", ii);
    // }
    // console.log(ii);

    console.log("///////////중첩 for문//////////");
    for (let dan = 2; dan <= 9; dan++) {
        for (let multiple = 1; multiple <= 9; multiple++) {
            console.log(`${dan} × ${multiple} = ${dan * multiple}`);
        }
    }

    console.log("///////////break문//////////");
//     while, for과 같은 반복문을 강제로 종료시키고자 할 때 사용한다.
    for(let i = 1; i < 100; i++) {
        // console.log(i);
        if(i % 11 === 0) {
            break;
        }
        console.log(i);
    }

    console.log("///////////continue문//////////");
    for(let i = 1; i < 20; i++) {
        if(i % 11 === 0) {
            continue; //실행되면 즉시 출력없이 증감식으로 이동
        }
        console.log(i);
    }

    let ii = 0;
    while(ii < 10) {
        if(ii % 2 === 0) {
            ii++;
            continue;
        }
        console.log(ii);
        ii++;
    }

    console.log("///////////1~100까지의 합 구하기//////////");
    let sum = 0; //현재까지의 합을 저장할 변수 설정
    for(let i = 1; i <= 100; i++) {
        sum += i;
        console.log(sum);
    }
    console.log("최종 sum:", sum);

    console.log("///////////5! 구하기//////////");
    let factorial = 1;
    for(let i = 1; i <= 5; i++) {
        factorial *= i;
        console.log(factorial);
    }
    console.log("최종 factorial:", factorial);


    console.log("///////////정수 n이 있을 때 n의 약수를 전부 더하기 //////////");
    let integer = 120;
    let divisorSum = 0;
    for(let i = 1; i <= integer; i++) {
        if(integer % i === 0){
            divisorSum += i;
        }
    }
    console.log("약수의 합 : ", divisorSum);




</script>
