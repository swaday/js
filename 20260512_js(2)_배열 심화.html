<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>배열 심화</title>
</head>
<body>

</body>
</html>

<script>

    ////////////////////// 배열에 넣고 빼기

    var arr = [10,20,30,40,50];
    console.log(`arr : `, arr);
    arr.push(60); // 배열의 마지막에 요소(element)를 추가하는 메서드
    console.log(`arr : `, arr);
    arr.push(70, 80, 90, 100); // 배열의 마지막에 요소(element)를 여러개 추가할 수 있다.
    console.log(`arr : `, arr);
    var data = arr.pop(); // 배열 내 마지막에 있는 데이터를 삭제한다. -> 데이터를 꺼내오는 개념. 따라서 데이터를 다른 변수에 할당할 수 있다.
    console.log('data : ', data);
    console.log(`arr : `, arr);
    var data = arr.shift(); // 배열 내 첫번째에 있는 데이터를 삭제한다. -> 데이터를 꺼내오는 개념. 따라서 데이터를 다른 변수에 할당할 수 있다.
    console.log('data : ', data);
    console.log(`arr : `, arr);
    arr.unshift(-20, -10); // 배열의 첫번째에 요소(element)를 추가하는 메서드
    console.log(`arr : `, arr);

/////////////////////
    var arr = [10,20,30,40,50];
    arr.reverse(); // 배열 내 데이터를 역순으로 정렬한다.
    console.log(`arr : `, arr);

    arr.splice(2); // 배열 내 위치 뒤의 모든 데이터를 삭제한다.
    console.log(`arr : `, arr);

    arr.splice(4, 1);
    console.log(`arr : `, arr);

/////////////////////
    var arr = [10,20,30,20,50];
    var i = arr.indexOf(20); // 배열 내 특정 데이터의 Index를 찾는다. -> 없으면 -1이다.
    console.log(`arr : `, i);

    var arr = [10,20,30,20,50];
    var i = arr.slice(1, 4); // 일부만 잘라서 가져오기
    console.log(`arr : `, i);

    var arr = [10,20,30,40,50];
    var result = arr.join(`cm`);
    console.log(`arr : `, result);

</script>
