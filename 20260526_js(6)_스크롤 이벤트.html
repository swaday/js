<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>스크롤이벤트</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    html{
        scroll-behavior: smooth;
    }
    h1{
        font-size: 7rem;
    }
    section{
        position: relative;
        background-color: #e33f3f;
        padding: 40px 0;
    }
    section > div{
        position: absolute;
        width: 300px;
        height: 300px;
        background-color: #c1c1c1;
        left: 0;
        /*animation-name: move_box;*/
        /*animation: move_box;*/
        animation-duration: 1s;
        animation-direction: alternate;
    }
    a{
        font-size: 4rem;
        border: 2px solid black;
        border-radius: 20px;
        padding: 10px;
    }


    @keyframes move_box{
        from{
            left: 0;
        }
        to{
            left: 100%;
        }
    }

</style>
<body>
    <a href="#scroll-section">TITLE로 이동</a>
    <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
    <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
    <section id="scroll-section">
        <h1>TITLE</h1>
        <div></div>
    </section>
    <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
    <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>

</body>
</html>

<script>
    let section = document.querySelector(`section`);
    let div = section.querySelector(`div`);
    // observer : 문서 내의 어떤 요소를 지켜보고 있는 감시자
    // 1. 요소가 문서에 나타났을 때 실행할 함수
    // 2. 추가 option(객체 형태)
    let observerOption = {
        root: null, // 대상 요소를 감시할 기준이 되는 부모 영역(기본값(null) : 뷰포트)
        rootMargin: `0px 0px 0px 0px`, // 기준 영역(root)의 영역을 확장하거나 축소할 때 사용
        threshold: 0.0 // 대상 요소가 얼마나 보여야 함수를 실행할지를 결정하는 비율(0 ~ 1 // 퍼센트 비율이라고 생각하면 편하다~)
    }
    let observer = new IntersectionObserver(move, observerOption);
    observer.observe(section); // section을 찾으면 move 함수 실행
    function move(entries, observer){
        console.log(`find it!`);
        console.log(entries);
        console.log(observer);
    }
