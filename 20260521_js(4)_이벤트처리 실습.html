<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>мқҙлІӨнҠё мІҳлҰ¬ мӢӨмҠө</title>
</head>
<style>
    section{
        width: 300px;
        height: 300px;
        border: 10px solid #f5ff9f;
        background-color: #533333;
    }
    article{
        width: 300px;
        height: 300px;
        border: 1px solid black;
    }
    button{
        width: 100px;
        height: 50px;
        border: 1px solid black;
        background-color: #f5ff9f;
    }

</style>


<body>
    <section></section>
    <article></article>
    <button type="button"></button>
</body>
</html>



<script>
    // sectionмқ„ нҒҙлҰӯн•ҳл©ҙ л°°кІҪмғүмқ„ лӢӨлҘё кІғмңјлЎң ліҖкІҪ
    // sectionмқ„ нҒҙлҰӯн•ҳл©ҙ borderлҘј 2pxлЎң dashedлЎң ліҖкІҪ

    let section = document.querySelector('section');
    section.onclick = function(){
        section.style.backgroundColor = 'blue';
        section.style.border = '2px dashed yellow';
    }


    // let section = document.querySelector('section');
    // let changed = false;
    //
    // section.onclick = function () {
    //     if (changed === false) {
    //         section.style.backgroundColor = 'blue';
    //         section.style.border = '2px dashed yellow';
    //         changed = true;
    //     } else {
    //         section.style.backgroundColor = 'white';
    //         section.style.border = '1px solid black';
    //         changed = false;
    //     }
    // };

    // sectionмқ„ нҒҙлҰӯн–Ҳмқ„ л•Ң articleмқҳ л°°кІҪмғүмқ„ ліҖкІҪ
    function articleClick(){
        article.style.backgroundColor = 'red';
    }
    let article = document.querySelector('article');
    section.addEventListener(`click`, articleClick);


    // article нҒҙлҰӯн–Ҳмқ„ л•Ң articleмқ„ sectionкіј лҸҷмқјн•ң л°°кІҪмғү, borderлЎң л°”кҫём„ёмҡ”.
    let article = document.querySelector('article');
    let section = document.querySelector('section');

    // function articleClick(){
    //     let sectionStyle = getComputedStyle(section);
    //     article.style.backgroundColor = sectionStyle.backgroundColor;
    //     article.style.border = sectionStyle.border;
    // }
    // article.addEventListener('click', articleClick);

    article.onclick = () => {
        article.style.backgroundColor = getComputedStyle(section).backgroundColor;
    }

    // button нҒҙлҰӯн–Ҳмқ„ л•Ң нҳ„мһ¬ section нғңк·ёлҘј ліөмӮ¬н•ҙм„ң лҸҷмқјн•ң sectionмқ„ bodyм•Ҳм—җ мғқм„ұн•ҳм„ёмҡ”.
    // let button = document.querySelector('button');
    button.onclick = () => {
        let sectionClone = section.cloneNode();
        document.body.appendChild(sectionClone);
    }



</script>
