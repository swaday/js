        let answer = ``;
        for (let ans of my_string) {

            }
        }

    }

    function solution2(array, height) {
        var answer = 0;
        for (var i = 0; i < array.length; i++) {

            }

    function solution3(num_list){
        let answer = [];
        for ( let i = num_list.length - 1; i >= 0; i-- ) {

        }
