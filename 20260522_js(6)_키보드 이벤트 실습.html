// 문제. asdf 각 키를 눌렀을 때, 키에 맞는 색상을 자신이 정해서,
// 각 section의 배경색을 변경하세요.
// 예시) a를 누르면 첫번째 section의 색이 빨강이 됩니다.
// 단, 어떤 키를 눌렀을 때, 해당 박스의 색만 변경되어야 하고,
// 나머지 박스는 색이 초기화되어야 합니다.

    let sections = document.querySelectorAll('section');
    window.onkeydown = (event) => {
        sections.forEach(section => {
            section.style.backgroundColor = `lightgray`;
        })
        if(event.key === 'a'){
            sections[0].style.backgroundColor = '#ff8b8b';
        }else if(event.key === 's'){
            sections[1].style.backgroundColor = '#f5ff9f';
        }else if(event.key === 'd'){
            sections[2].style.backgroundColor = '#a6ff98';
        }else if(event.key === 'f'){
            sections[3].style.backgroundColor = '#87f5ff';
        }
    }
